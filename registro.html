<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - VITALIS +</title>
    <link rel="stylesheet" href="css/registro.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <img src="img/simbolo.png" alt="logo.vitalis" width="60" height="60">
                <h1>VITALIS +</h1>
            </div>
            <p class="subtitle">Cree su cuenta de usuario para comenzar</p>

            <form>
                <div class="input-row">
                    <div class="input-group">
                        <input type="text" placeholder="Nombre" required>
                    </div>
                    <div class="input-group">
                        <input type="text" placeholder="Apellido" required>
                    </div>
                </div>

                <div class="input-group">
                    <input type="text" placeholder="Cédula de Identidad" required>
                </div>

                <div class="input-group">
                    <input type="email" placeholder="Correo electrónico" required>
                </div>

                <div class="input-group">
                    <input type="password" placeholder="Contraseña" required>
                </div>

                <div class="input-group">
                    <input type="password" placeholder="Confirmar Contraseña" required>
                </div>

                <button type="submit" class="btn-register">Registrarse ahora</button>
            </form>

            <p class="register">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </p>
        </div>
    </div>
</body>
</html>
