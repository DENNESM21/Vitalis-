<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda tu cita - VITALIS+</title>
    <link rel="stylesheet" href="css/agendar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
    <section class="appointment-section" id="citas">
        <div class="appointment-container">
            <div class="appointment-info">
                <h2>Agenda tu cita médica</h2>
                <p>
                    Selecciona la especialidad,
                    el médico y el horario que
                    mejor se adapte a tus necesidades.
                </p>
                <img src="img/animado.png" alt="Doctor animado">
            </div>
            <form class="appointment-form">
                <div class="form-group">
                    <label for="especialidad">
                        Especialidad
                    </label>
                    <select id="especialidad">
                        <option>
                            Seleccione una especialidad
                        </option>
                        <option>
                            Medicina General
                        </option>
                        <option>
                            Cardiología
                        </option>
                        <option>
                            Neurología
                        </option>
                        <option>
                            Pediatría
                        </option>
                        <option>
                            Dermatología
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="medico">
                        Médico
                    </label>
                    <select id="medico">
                        <option>
                            Seleccione un médico
                        </option>
                        <option>
                            Dr. Juan Pérez
                        </option>
                        <option>
                            Dra. María García
                        </option>
                        <option>
                            Dr. Carlos López
                        </option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="fecha">
                            Fecha
                        </label>
                        <input type="date" id="fecha">
                    </div>
                    <div class="form-group">
                        <label for="hora">
                            Hora
                        </label>
                        <input type="time" id="hora">
                    </div>
                </div>
                <div class="form-group">

                    <label for="motivo">
                        Motivo de consulta
                    </label>

                    <textarea id="motivo" rows="4" placeholder="Describe brevemente tu consulta">
                    </textarea>
                </div>
                <button type="submit" class="appointment-btn">
                    <i class="fa-solid fa-circle-check"></i>
                    Confirmar cita
                </button>
            </form>
        </div>
    </section>
    <footer class="footer">
        <h2>VITALIS +</h2>
        <p>Plataforma de citas médicas. ESFOT - EPN . 2026</p>
        <div class="redes-icons">
            <div class="social-icons">
                <a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="https://www.instagram.com" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://www.twitter.com" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-x-twitter"></i></a>
            </div>
        </div>
    </footer>
</body>
</html>
